<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brayan Vega Garófalo — Portafolio Interactivo | Desarrollador Fullstack</title>
  <meta name="description"
    content="Portafolio interactivo de Brayan Vega Garófalo, Desarrollador Fullstack Junior. Explora mi setup virtual y descubre mi experiencia, proyectos y habilidades.">
  <meta name="author" content="Brayan Jasmany Vega Garófalo">
  <meta name="keywords" content="Desarrollador Fullstack, NestJS, React, AWS, Azure, Quito Ecuador, Portafolio">

  <!-- Open Graph -->
  <meta property="og:title" content="Brayan Vega Garófalo — Portafolio Interactivo">
  <meta property="og:description"
    content="Un portafolio inmersivo donde cada objeto de mi setup gamer representa una sección de mi CV.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_EC">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="src/css/portfolio.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/logo.png">
</head>

<body>

  <!-- ══ LOADER ════════════════════════════════ -->
  <div id="loader" class="loader" role="status" aria-label="Cargando portafolio">
    <div class="loader-content">
      <div class="loader-logo">⟨/⟩</div>
      <div class="loader-tagline">Brayan Vega · Portafolio Interactivo</div>
      <div class="loader-bar">
        <div class="loader-fill" id="loaderFill"></div>
      </div>
      <p class="loader-text">Preparando tu experiencia…</p>
    </div>
  </div>

  <!-- ══ APP ═══════════════════════════════════ -->
  <div id="app" class="app">

    <!-- HEADER -->
    <header class="floating-header" role="banner">
      <div class="header-brand">
        <span class="header-icon" aria-hidden="true">⟨/⟩</span>
        <div>
          <span class="header-title">MI PORTAFOLIO INTERACTIVO</span>
          <span class="header-sub">Explora el setup y conoce más sobre mí</span>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <div class="header-hint" aria-live="polite">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Haz clic en las zonas interactivas
        </div>
        <button id="langToggleBtn" class="lang-toggle-btn" aria-label="Toggle language">
          <strong>ES</strong> | <span style="opacity:0.5">EN</span>
        </button>
      </div>
    </header>

    <!-- ESCENARIO — full room -->
    <main class="scene-container" id="sceneContainer" role="main">

      <!-- Fondo: setup completo visible -->
      <div class="scene-bg" role="img" aria-label="Setup gamer y de programador"></div>

      <!-- Vignette sutil -->
      <div class="scene-overlay" aria-hidden="true"></div>

      <!-- HOTSPOTS generados por JS -->
      <div class="hotspots-layer" id="hotspotsLayer"
        role="navigation" aria-label="Zonas interactivas del portafolio"></div>

      <!-- Zone glow -->
      <div class="zone-glow" id="zoneGlow" aria-hidden="true"></div>

    </main>

    <!-- AVATAR — fijo izquierda o centro -->
    <div class="avatar-container hidden" id="avatarContainer" aria-hidden="true">
      <img
        src="img/pose-about.png"
        id="avatar"
        class="avatar-img"
        alt="Avatar de Brayan Vega Garófalo"
      >
      <div class="avatar-shadow"></div>
      <div class="avatar-glow"></div>
    </div>

    <!-- PANEL DE INFORMACIÓN — flotante junto al avatar -->
    <aside class="info-panel" id="infoPanel" aria-hidden="true">
      <div class="panel-layout">
        <div class="content-col" style="flex: 1;">
          <div class="panel-header" style="padding: 2rem 1rem 1rem; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="panelZoneTitle" style="font-size: 2.4rem; font-weight: 800; margin: 0; color: #fff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 20px rgba(138,43,226,0.6);">Título</h2>
            <div style="display:flex; align-items:center; gap: 0.6rem;">
              <button class="nav-btn" id="prevZoneBtn" aria-label="Anterior">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <button class="nav-btn" id="nextZoneBtn" aria-label="Siguiente">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
              <button class="close-btn" id="closePanelBtn" aria-label="Cerrar panel">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
          </div>
          <div class="panel-body" id="panelBody" role="region" aria-live="polite"></div>
        </div>
      </div>
    </aside>

    <!-- SOCIAL BAR -->
    <nav class="social-bar" id="socialBar" role="navigation" aria-label="Redes sociales">
      <a href="#" class="social-btn" id="sb-github" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        <span>GitHub</span>
      </a>
      <a href="#" class="social-btn" id="sb-linkedin" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
        </svg>
        <span>LinkedIn</span>
      </a>
      <a href="#" class="social-btn" id="sb-email" aria-label="Email">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/>
        </svg>
        <span>Email</span>
      </a>
    </nav>

  </div><!-- /#app -->

  <script src="src/js/portfolio.js"></script>

</body>
</html>
